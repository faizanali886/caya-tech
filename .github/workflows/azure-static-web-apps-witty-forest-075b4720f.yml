name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - test
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - test

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Make sure WITTY_FOREST_075B4720F matches what you have in your GitHub Secrets!
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_FOREST_075B4720F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend" 
          api_location: "" 
          output_location: "build"
          
          # This overrides the default npm behavior and builds it exactly like your local system
          app_build_command: "yarn install && yarn build"
        env:
          NODE_VERSION: '22'

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_FOREST_075B4720F }}
          action: "close"